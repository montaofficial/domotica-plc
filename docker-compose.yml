# Production docker-compose for Domotica PLC / KNX Controller.
# Copy .env.example to .env and set the secrets before running:
#   docker compose up -d --build

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: domotica-plc
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=${PORT:-3000}
    volumes:
      - knx-data:/app/data
    # KNX/IP tunneling needs UDP 3671 to/from the gateway on the local LAN.
    # `network_mode: host` is the simplest way to make that work; the
    # container will bind PORT directly on the host.
    network_mode: host
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:${PORT:-3000}/api/health"
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  knx-data:
    driver: local
